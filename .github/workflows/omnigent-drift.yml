name: Omnigent contract drift

# omnigent is alpha: the policy contract the omnigent adapter is built
# against can churn without notice. This job diffs the upstream contract
# surface against OMNIGENT_VERIFIED_COMMIT (build/omnigent_drift.py) so
# drift is caught on a schedule instead of discovered in prod.

on:
  schedule:
    - cron: "17 6 * * 1,4" # Mon+Thu 06:17 UTC
  workflow_dispatch:
  pull_request:
    paths:
      - "adapters/omnigent/**"
      - "build/omnigent_drift.py"

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Diff upstream contract surface vs pin
        run: python3 build/omnigent_drift.py
