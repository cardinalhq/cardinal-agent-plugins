name: Release adapter to mirror

on:
  workflow_dispatch:
    inputs:
      adapter:
        description: Adapter to release (version read from its plugin.json)
        required: true
        type: choice
        options: [claude, codex, cursor, gemini]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Core suite
        run: cd core && python3 -m unittest discover tests
      - name: Vendor + adapter suite
        run: |
          python3 build/vendor.py ${{ inputs.adapter }}
          cd adapters/${{ inputs.adapter }} && python3 -m unittest discover tests
      - name: Contract suite
        run: python3 -m unittest discover tests

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up mirror deploy key
        # Each mirror repo has a write deploy key; the private halves are
        # repo secrets. gh clones over SSH (git_protocol below) using this
        # key, and release.py's pushes ride the same remote — no PAT.
        env:
          KEY_CLAUDE: ${{ secrets.MIRROR_DEPLOY_KEY_CLAUDE }}
          KEY_CODEX: ${{ secrets.MIRROR_DEPLOY_KEY_CODEX }}
          KEY_CURSOR: ${{ secrets.MIRROR_DEPLOY_KEY_CURSOR }}
          KEY_GEMINI: ${{ secrets.MIRROR_DEPLOY_KEY_GEMINI }}
        run: |
          case "${{ inputs.adapter }}" in
            claude) KEY="$KEY_CLAUDE" ;;
            codex)  KEY="$KEY_CODEX" ;;
            cursor) KEY="$KEY_CURSOR" ;;
            gemini) KEY="$KEY_GEMINI" ;;
          esac
          if [ -z "$KEY" ]; then
            echo "missing MIRROR_DEPLOY_KEY secret for ${{ inputs.adapter }}" >&2
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$KEY" > ~/.ssh/mirror_deploy_key
          chmod 600 ~/.ssh/mirror_deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          {
            echo "Host github.com"
            echo "  IdentityFile ~/.ssh/mirror_deploy_key"
            echo "  IdentitiesOnly yes"
          } >> ~/.ssh/config
      - name: Release to mirror
        env:
          # Prefer MIRROR_PR_TOKEN (PAT with pull-requests:write on all 4
          # mirror repos — cardinal-{claude,codex,cursor,gemini}-plugin) so
          # release.py can auto-open + auto-merge the release PR when the
          # mirror's main is protected. Falls back to github.token when the
          # secret isn't configured — release.py will still push the
          # release/vX.Y.Z branch + tag, but manual PR merge will be
          # required (release.py emits a ::warning:: annotation naming the
          # branch so it doesn't get lost in stdout). Git push over SSH
          # rides the deploy key, unrelated to this token.
          GH_TOKEN: ${{ secrets.MIRROR_PR_TOKEN || github.token }}
        run: |
          gh config set git_protocol ssh
          git config --global user.name "cardinal-release-bot"
          git config --global user.email "release@cardinalhq.io"
          python3 build/release.py ${{ inputs.adapter }}
